name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API
        run: python -m pip install -e 'apps/api[test]'
      - name: Install CLI
        run: python -m pip install -e apps/cli --no-deps
      - name: Run tests
        run: python -m pytest apps/api apps/cli
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build web app
        working-directory: apps/web
        run: npm ci && npm run build
      - name: Block obvious secrets
        run: |
          ! grep -RInE '(BEGIN RSA|BEGIN OPENSSH|password\s*=\s*[^[:space:]]+|api[_-]?key\s*[:=]\s*["'\'']?[A-Za-z0-9_\-]{24,}|private[_-]?key\s*[:=]\s*["'\'']?[A-Za-z0-9_\-]{24,})' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude=ci.yml . \
            | grep -v '.env.example'
