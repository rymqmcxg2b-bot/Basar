<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basar Zero Cup Video</title>
    <meta
      name="description"
      content="Basar Zero Cup playable demo video page."
    >
    <style>
      :root {
        color: #f5f0df;
        background: #060806;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          linear-gradient(90deg, rgba(6, 8, 6, 0.94), rgba(6, 8, 6, 0.66)),
          url("../basar-hero.png") center / cover fixed;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        color: #fff9e6;
        font-weight: 700;
      }

      .brand img {
        width: 34px;
        height: 34px;
        border: 1px solid rgba(245, 240, 223, 0.22);
        border-radius: 6px;
      }

      h1 {
        margin: 0 0 8px;
        color: #fff9e6;
        font-size: clamp(36px, 6vw, 72px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0 0 22px;
        color: #d5cfb7;
        font-size: 17px;
        line-height: 1.55;
      }

      .player {
        overflow: hidden;
        border: 1px solid rgba(245, 240, 223, 0.22);
        border-radius: 8px;
        background: rgba(6, 8, 6, 0.9);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      .player img {
        display: block;
        width: 100%;
        height: auto;
        background: #060806;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      a,
      button {
        min-height: 42px;
        border: 1px solid rgba(245, 240, 223, 0.24);
        border-radius: 6px;
        padding: 10px 14px;
        color: #fff9e6;
        background: rgba(245, 240, 223, 0.08);
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      a:hover,
      button:hover {
        background: rgba(245, 240, 223, 0.16);
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 1120px);
          padding-top: 22px;
        }

        .actions a,
        .actions button {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="../basar-mark.png" alt="">
        <span>Basar</span>
      </div>
      <h1>Zero Cup Video</h1>
      <p>Add sources once. Review with many AIs. Keep the evidence.</p>

      <section class="player" aria-label="Basar Zero Cup playable demo video">
        <img
          id="demoGif"
          src="../basar-zero-cup-silent-subtitled.gif"
          alt="Basar Zero Cup silent subtitled demo."
        >
      </section>

      <div class="actions">
        <a href="../">Open Basar App</a>
        <a href="../basar-zero-cup-silent-subtitled.gif">Open GIF File</a>
        <button type="button" id="replayButton">Replay</button>
      </div>
    </main>

    <script>
      const demoGif = document.getElementById("demoGif");

      document.getElementById("replayButton").addEventListener("click", () => {
        demoGif.src = `../basar-zero-cup-silent-subtitled.gif?replay=${Date.now()}`;
      });
    </script>
  </body>
</html>
